name: Deploy to Polkadot Triangle

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup IPFS
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.2
      - run: ipfs init

      - name: Install deploy tool
        run: npm install -g bulletin-deploy

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            echo "Deploying to: fireflynetwork.dot"
            bulletin-deploy './apps/web/dist' "fireflynetwork.dot"
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          NODE_OPTIONS: '--max-old-space-size=8192'

