name: Deploy to Polkadot Triangle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup IPFS
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.2
      - run: ipfs init

      - name: Install deploy tool
        run: npm install -g bulletin-deploy

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              DOMAIN="pr${{ github.event.pull_request.number }}-fireflynetwork.dot"
            else
              DOMAIN="fireflynetwork.dot"
            fi
            echo "Deploying to: $DOMAIN"
            bulletin-deploy './apps/web/dist' "$DOMAIN"
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const domain = `pr${prNum}-fireflynetwork`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = `**${domain}.dot** · [logs](${runUrl})\n\nhttps://${domain}.dot.li`;
            const marker = `<!-- bulletin-deploy-${domain} -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body: fullBody,
              });
            }
