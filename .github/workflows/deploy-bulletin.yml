name: Deploy to Bulletin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      domain:
        description: 'Full domain (e.g. cucuyo.dot)'
        required: true
        default: 'cucuyo.dot'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.0

      - run: ipfs init

      - run: npm install -g github:paritytech/bulletin-deploy

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DOMAIN="${{ inputs.domain }}"
            elif [ "${{ github.event_name }}" = "pull_request" ]; then
              DOMAIN="cucuyo-${{ github.head_ref }}.dot"
            else
              DOMAIN="cucuyo.dot"
            fi
            bulletin-deploy './apps/web/dist' "$DOMAIN"
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const domain = 'cucuyo-${{ github.head_ref }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔥 **${domain}.dot**\n\nhttps://${domain}.dot.li\n\n[View logs](${runUrl})`
            });
